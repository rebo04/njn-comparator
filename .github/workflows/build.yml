name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # also lets you trigger manually from GitHub UI

jobs:

  # ── Windows .exe ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller customtkinter openpyxl

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed `
            --collect-all customtkinter `
            --name "NJN_Comparator" `
            app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NJN_Comparator_Windows
          path: dist/NJN_Comparator.exe

  # ── macOS .app ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller customtkinter openpyxl

      - name: Build .app
        run: |
          pyinstaller --windowed \
            --collect-all customtkinter \
            --name "NJN_Comparator" \
            app.py
          cd dist && zip -r NJN_Comparator_macOS.zip NJN_Comparator.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NJN_Comparator_macOS
          path: dist/NJN_Comparator_macOS.zip

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NJN_Comparator_Windows/NJN_Comparator.exe
            NJN_Comparator_macOS/NJN_Comparator_macOS.zip
          body: |
            ## NJN Comparator — ${{ github.ref_name }}

            ### Download & Run (no Python needed)
            | Platform | File | Instructions |
            |----------|------|-------------|
            | **Windows** | `NJN_Comparator.exe` | Download → double-click |
            | **macOS**   | `NJN_Comparator_macOS.zip` | Download → unzip → right-click the app → Open |

            > **macOS note:** First time only — right-click the `.app` and choose **Open** (macOS blocks unsigned apps on first launch, this bypasses it).
